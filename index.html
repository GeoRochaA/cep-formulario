<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta CEP</title>
  </head>
  <body>
    <main class="page-shell">
      <section class="panel" aria-labelledby="titulo-formulario">
        <header class="panel-header">
          <p class="eyebrow">Endereço</p>
          <h1 id="titulo-formulario">Consulta de CEP</h1>
        </header>

        <form id="address-form" novalidate>
          <div class="form-group form-group--full">
            <label for="cep">CEP</label>
            <div class="input-action">
              <input
                type="text"
                id="cep"
                name="cep"
                placeholder="00000-000"
                inputmode="numeric"
                autocomplete="postal-code"
                maxlength="9"
                aria-describedby="cep-hint status-message"
                required
              />
              <button type="submit" id="buscar">Consultar</button>
            </div>
            <span id="cep-hint" class="hint">Digite 8 números.</span>
          </div>

          <div id="status-message" class="status" role="status" aria-live="polite"></div>

          <div class="form-grid">
            <div class="form-group">
              <label for="logradouro">Logradouro</label>
              <input
                type="text"
                id="logradouro"
                name="logradouro"
                placeholder="Rua, avenida ou travessa"
                autocomplete="address-line1"
              />
            </div>

            <div class="form-group">
              <label for="numero">Número</label>
              <input
                type="text"
                id="numero"
                name="numero"
                placeholder="123"
                autocomplete="address-line2"
              />
            </div>

            <div class="form-group">
              <label for="bairro">Bairro</label>
              <input
                type="text"
                id="bairro"
                name="bairro"
                placeholder="Centro"
                autocomplete="address-level3"
              />
            </div>

            <div class="form-group">
              <label for="estado">Estado</label>
              <select id="estado" name="estado" autocomplete="address-level1">
                <option value="">Selecione o estado</option>
                <option value="AC">Acre</option>
                <option value="AL">Alagoas</option>
                <option value="AP">Amapá</option>
                <option value="AM">Amazonas</option>
                <option value="BA">Bahia</option>
                <option value="CE">Ceará</option>
                <option value="DF">Distrito Federal</option>
                <option value="ES">Espírito Santo</option>
                <option value="GO">Goiás</option>
                <option value="MA">Maranhão</option>
                <option value="MT">Mato Grosso</option>
                <option value="MS">Mato Grosso do Sul</option>
                <option value="MG">Minas Gerais</option>
                <option value="PA">Pará</option>
                <option value="PB">Paraíba</option>
                <option value="PR">Paraná</option>
                <option value="PE">Pernambuco</option>
                <option value="PI">Piauí</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="RO">Rondônia</option>
                <option value="RR">Roraima</option>
                <option value="SC">Santa Catarina</option>
                <option value="SP">São Paulo</option>
                <option value="SE">Sergipe</option>
                <option value="TO">Tocantins</option>
              </select>
            </div>

            <div class="form-group">
              <label for="cidade">Cidade</label>
              <input
                type="text"
                id="cidade"
                name="cidade"
                placeholder="Cidade"
                autocomplete="address-level2"
              />
            </div>
          </div>

          <div class="form-actions">
            <button type="button" id="limpar" class="button-secondary">Limpar</button>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
